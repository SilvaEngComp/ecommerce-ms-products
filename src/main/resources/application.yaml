spring:
  application:
    name: products
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:5555/ecommerceproducts
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    com.eliabe.ecommerce.products: DEBUG
    com.eliabe.ecommerce.products.infrastructore.acpects: DEBUG
    org.springframework: WARN
    org.springframework.boot: INFO
  file:
    name: logs/application.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

server:
  port: 8081
